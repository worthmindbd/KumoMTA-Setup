# =============================================================================
# listener_domains.toml  ->  inbound handling for the port-25 listener
# -----------------------------------------------------------------------------
# Accept and log out-of-band (OOB) bounces and ARF/FBL reports for our domain.
# relay_to = false ensures the server is NOT an open relay
# (= PowerMTA always-allow-relaying no on <source 0/0>).
# =============================================================================

["neumannassociatesnews.io"]
log_oob = true
log_arf = true
relay_to = false
