# =============================================================================
# dkim_data.toml  ->  replaces PowerMTA dkim-* directives + domain-key
# -----------------------------------------------------------------------------
# You send From: addresses on the MAIN domain (neumannassociatesnews.io); the
# subdomains are only SMTP server/HELO identities, so this is single-domain
# DKIM signing.
#
# IMPORTANT: reuse the SAME key PowerMTA used (selector "pmta"). The matching
# public key is already published at pmta._domainkey.neumannassociatesnews.io.
# Copy your backed-up /etc/pmta/pmta.pem to the path below (see README).
# =============================================================================

[base]
selector = "pmta"                    # = PowerMTA domain-key selector "pmta"
algo = "sha256"                      # = dkim-algorithm rsa-sha256
header_canonicalization = "Relaxed"  # = dkim-headers-canon relaxed
body_canonicalization = "Relaxed"    # = dkim-body-canon relaxed
headers = ["From", "To", "Subject", "Date", "MIME-Version", "Content-Type", "Message-ID"]

[domain."neumannassociatesnews.io"]
selector = "pmta"
# Key resolves by convention to:
#   /opt/kumomta/etc/dkim/neumannassociatesnews.io/pmta.key
